name: Deploy backend to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18 (for Vercel CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build backend (optional - sanity check)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --user -r requirements.txt || true

      - name: Deploy backend to Vercel
        working-directory: backend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Use npx to run Vercel CLI without global install
          npx --yes vercel --prod --confirm --token "$VERCEL_TOKEN"

